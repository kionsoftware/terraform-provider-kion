name: golangci-lint
on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25.9'
          cache: false

      - name: Run Linter
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --issues-exit-code=1
